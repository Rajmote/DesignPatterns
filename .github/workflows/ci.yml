name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch the code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the .NET 10 SDK version
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Latest .NET 10 SDK patch

    # 3. Download and cache NuGet packages
    - name: Restore dependencies
      run: dotnet restore DesignPatterns.sln

    # 4. Verify formatting — FAILS the build if any file is not formatted per .editorconfig.
    #    Fix locally with:  dotnet format DesignPatterns.sln
    - name: Verify formatting
      run: dotnet format DesignPatterns.sln --verify-no-changes --no-restore

    # 5. Compile in Release (analyzers + code-style run here via Directory.Build.props)
    - name: Build project
      run: dotnet build DesignPatterns.sln --configuration Release --no-restore

    # 6. Run all unit tests
    - name: Run tests
      run: dotnet test DesignPatterns.sln --configuration Release --no-build --verbosity normal
